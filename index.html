<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Tablero de Comunicación</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
</head>
<body>

    <header class="encabezado-escuela">
        <img src="logo_nemi_e.jpg" alt="Logo" class="logo-escuela" onerror="this.style.display='none'">
        <div>
            <h1>Mi Tablero</h1>
            <p class="nombre-escuela">Panel de Comunicación</p>
        </div>
    </header>

    <div class="contenedor-principal">
        <div class="seccion-frase">
            <div id="contenedor-frase"></div>
            <div class="frase-controles">
                <button onclick="window.reproducirFraseCompleta()" class="btn-reproducir">🔊 Escuchar</button>
                <button onclick="window.borrarFrase()" class="btn-borrar-frase">🗑️ Borrar Todo</button>
            </div>
        </div>

        <div class="menu-config">
            <button onclick="window.añadirCelda()" class="btn-ajuste btn-añadir">➕ Añadir</button>
            <button onclick="window.quitarCelda()" class="btn-ajuste btn-quitar">➖ Quitar</button>
            
            <label class="btn-ajuste btn-cargar">
                📂 Cargar
                <input type="file" id="importar-archivo" hidden onchange="window.importarTablero(event)">
            </label>

            <button onclick="window.exportarTablero()" class="btn-ajuste btn-guardar">💾 Respaldo</button>
            <button onclick="window.reiniciarTableroCompleto()" class="btn-ajuste btn-reiniciar">🔄 Reiniciar</button>
        </div>

        <div id="grid-tablero" class="grid-tablero"></div>
    </div>

    <div id="modal-buscador" class="modal">
        <div class="modal-content">
            <span class="close" onclick="window.cerrarModal()">&times;</span>
            <h2>Editar Celda</h2>
            
            <div class="busqueda-arasaac">
                <input type="text" id="input-busqueda" placeholder="Buscar en ARASAAC...">
                <button type="button" class="btn-cargar" onclick="window.ejecutarBusqueda()">Buscar</button>
            </div>

            <div id="resultados-busqueda"></div>

            <div class="opciones-subida">
                <p style="color: #666; font-size: 13px;">O usa una foto y voz propia:</p>
                
                <input type="text" id="input-texto-modal" placeholder="Nombre de la imagen...">

                <label class="btn-ajuste" style="background: #6c757d; display: block; text-align: center;">
                    📷 Elegir Foto
                    <input type="file" onchange="window.subirImagenLocal(event)" hidden>
                </label>

                <button id="btn-grabar" onclick="window.gestionarGrabacion(event)" class="btn-ajuste" style="background: #007bff;">
                    🎤 Grabar Voz
                </button>

                <button onclick="window.cerrarModal()" style="background: #28a745; margin-top: 10px;">
                    ✅ Finalizar
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
